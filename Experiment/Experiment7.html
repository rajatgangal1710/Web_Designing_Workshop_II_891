<!DOCTYPE html>
<html>

<head>

<title>Experiment 7</title>

<!-- React CDN -->

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background-color:#f3f4f6;
}

.container{
text-align:center;
padding-top:10px;
}

h1{
color:black;
margin-bottom:20px;
}

.card{
width:300px;
margin:20px auto;
background-color:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card h2{
color:#1f3b5c;
}

.card p{
margin:10px 0;
font-size:16px;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

function Student(props){

return(

<div className="card">

<h2>{props.name}</h2>

<p>
Course: {props.course}
</p>

<p>
Marks: {props.marks}
</p>

</div>

);

}

function App(){

return(

<div className="container">

<h1>
Student Information
</h1>

<Student
name="Rahul Sharma"
course="Computer Science"
marks="85"
/>

<Student
name="Anita Verma"
course="Information Technology"
marks="92"
/>

<Student
name="Rohan Gupta"
course="Electronics"
marks="78"
/>

</div>

);

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App />);

</script>

</body>

</html>
