<!DOCTYPE html>
<html>
<head>

<title>DOM Experiment</title>

<style>

body{
font-family:Arial;
background-color:#f2f2f2;
margin:0;
padding:0;
transition:0.3s;
}

.box{

width:75%;
margin:40px auto;
background-color:white;
padding:30px;
text-align:center;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

h1{
color:#222;
font-size:35px;
transition:0.3s;
}

input{

padding:10px;
width:250px;
border-radius:5px;
border:1px solid gray;
font-size:15px;

}

button{

padding:10px 15px;
margin:8px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
font-size:14px;

}

#textBtn{
background-color:#2563eb;
}

#bgBtn{
background-color:#16a34a;
}

#fontBtn{
background-color:#9333ea;
}

#toggleBtn{
background-color:#dc2626;
}

#resetBtn{
background-color:#0f766e;
}

p{
margin-top:25px;
font-size:22px;
}

</style>

</head>

<body>

<div class="box">

<h1 id="heading">
Welcome to JavaScript Lab
</h1>

<input 
type="text"
id="inputText"
placeholder="Enter heading text">

<br><br>

<button id="textBtn">
Change Heading
</button>

<button id="bgBtn">
Change Background
</button>

<button id="fontBtn">
Increase Font
</button>

<button id="toggleBtn">
Show / Hide
</button>

<button id="resetBtn">
Reset
</button>

<p id="para">
JavaScript can change webpage content dynamically.
</p>

</div>

<script>

let heading = document.getElementById("heading");

let input = document.getElementById("inputText");

let para = document.getElementById("para");

let colors = [

"#f2f2f2",
"#dbeafe",
"#fde68a",
"#fecdd3",
"#bbf7d0",
"#ddd6fe"

];

let index = 0;

document.getElementById("textBtn").onclick = function(){

if(input.value != "")
{
heading.innerHTML = input.value;
}

};

document.getElementById("bgBtn").onclick = function(){

index++;

if(index >= colors.length)
{
index = 0;
}

document.body.style.backgroundColor = colors[index];

};

document.getElementById("fontBtn").onclick = function(){

heading.style.fontSize = "45px";

};

let show = true;

document.getElementById("toggleBtn").onclick = function(){

if(show == true)
{
para.style.display = "none";
show = false;
}

else
{
para.style.display = "block";
show = true;
}

};

document.getElementById("resetBtn").onclick = function(){

heading.innerHTML = "Welcome to JavaScript Lab";

heading.style.fontSize = "35px";

document.body.style.backgroundColor = "#f2f2f2";

para.style.display = "block";

input.value = "";

show = true;

index = 0;

};

</script>

</body>
</html>
