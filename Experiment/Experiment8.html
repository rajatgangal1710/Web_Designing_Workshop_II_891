<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Experiment 8</title>

<!-- React CDN -->

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(to right,#dbeafe,#eff6ff);
}

.container{
width:340px;
margin:60px auto;
background-color:white;
padding:35px;
text-align:center;
border-radius:15px;
box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h1{
color:#111827;
margin-bottom:25px;
font-size:34px;
}

#count{
font-size:65px;
color:#2563eb;
margin:20px 0px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#incBtn{
background-color:#16a34a;
}

#decBtn{
background-color:#dc2626;
}

#resetBtn{
background-color:#2563eb;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

const [count, setCount] = useState(0);

function increase(){
setCount(count + 1);
}

function decrease(){
setCount(count - 1);
}

function reset(){
setCount(0);
}

return(

<div className="container">

<h1>
Counter <br />
Application
</h1>

<h2 id="count">
{count}
</h2>

<button id="incBtn" onClick={increase}>
Increment (+)
</button>

<button id="decBtn" onClick={decrease}>
Decrement (-)
</button>

<br />

<button id="resetBtn" onClick={reset}>
Reset
</button>

</div>

);

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App />);

</script>

</body>

</html>
