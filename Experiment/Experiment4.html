<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment 4</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url('ABES.jpeg') no-repeat center;
background-size:cover;
font-family:Arial;
}

.card{
background-color:#ffffff;
border-radius:14px;
}

#resultBox{
background:#f8f9fa;
}

</style>

</head>

<body class="d-flex align-items-end justify-content-center vh-100">

<div class="container mb-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h3 class="text-center mb-3">
Student Result Calculator
</h3>

<p class="text-center text-muted">
Enter number of subjects
</p>

<div class="mb-3">

<label class="form-label">
Number of Subjects
</label>

<input 
type="number"
id="numSubjects"
class="form-control"
placeholder="1 to 12"
min="1"
max="12">

</div>

<div class="d-grid">

<button class="btn btn-dark" onclick="calculateResult()">
Calculate Result
</button>

</div>

<div id="resultBox" class="mt-4 p-3 border rounded d-none"></div>

</div>
</div>

</div>
</div>
</div>

<script>

function calculateResult() {

let numSubjects = parseInt(document.getElementById("numSubjects").value);

if (isNaN(numSubjects) || numSubjects <= 0 || numSubjects > 12) {

alert("Enter number between 1 and 12");
return;

}

let totalMarks = 0;
let marksArray = [];

for (let i = 1; i <= numSubjects; i++) {

let input = prompt("Enter marks for Subject " + i);

if (input === null) return;

let mark = parseFloat(input);

if (isNaN(mark) || mark < 0 || mark > 100) {

alert("Enter marks between 0 and 100");
return;

}

marksArray.push(mark);

totalMarks = totalMarks + mark;

}

let averageMarks = totalMarks / numSubjects;

averageMarks = parseFloat(averageMarks.toFixed(2));

let grade;
let gradeClass;

if (averageMarks >= 90) {

grade = "A";
gradeClass = "text-success";

}

else if (averageMarks >= 75) {

grade = "B";
gradeClass = "text-primary";

}

else if (averageMarks >= 60) {

grade = "C";
gradeClass = "text-warning";

}

else if (averageMarks >= 40) {

grade = "D";
gradeClass = "text-secondary";

}

else {

grade = "F";
gradeClass = "text-danger";

}

let resultStatus;
let resultClass;

if (averageMarks >= 40) {

resultStatus = "PASS";
resultClass = "text-success";

}

else {

resultStatus = "FAIL";
resultClass = "text-danger";

}

let resultBox = document.getElementById("resultBox");

resultBox.innerHTML = `

<h5 class="mb-3">Result Summary</h5>

<div class="d-flex justify-content-between">
<span>Subjects</span>
<span>${numSubjects}</span>
</div>

<div class="d-flex justify-content-between">
<span>Total Marks</span>
<span>${totalMarks}</span>
</div>

<div class="d-flex justify-content-between">
<span>Average</span>
<span>${averageMarks}</span>
</div>

<div class="d-flex justify-content-between">
<span>Grade</span>
<span class="${gradeClass}">${grade}</span>
</div>

<div class="d-flex justify-content-between">
<span>Result</span>
<span class="${resultClass}">${resultStatus}</span>
</div>

`;

resultBox.classList.remove("d-none");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
